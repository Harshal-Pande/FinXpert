version: "3.8"

services:
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://finxpert:finxpert@db:5432/finxpert
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finxpert
      POSTGRES_PASSWORD: finxpert
      POSTGRES_DB: finxpert
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finxpert"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
